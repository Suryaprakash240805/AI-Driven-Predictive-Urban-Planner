model:
  node_in_dim: 18
  edge_in_dim: 4
  hidden_dim: 64
  num_heads: 4
  dropout: 0.3
  num_classes: 1

train:
  epochs: 100
  batch_size: 32
  lr: 0.0003
  weight_decay: 0.0001
  patience: 15
  seed: 42

data:
  n_train: 8000
  n_val: 1000
  n_test: 1000
  use_types:
    - residential
    - commercial
    - mixed

nbc:
  min_setback_m: 3.0
  max_far_residential: 1.5
  max_far_commercial: 2.5
  min_green_ratio: 0.15
  min_road_width_m: 6.0
  min_parking_ratio: 0.10
